extends: capitalization
message: "'%s' should use sentence-style capitalization."
level: warning
scope: heading
match: $sentence
indicators:
  - ":"
exceptions:
  - Azure
  - CLI
  - CSM
  - Discord
  - Docker
  - Emmet
  - FAQ
  - I
  - Kubernetes
  - Linux
  - macOS
  - Marketplace
  - MongoDB
  - REPL
  - Slack
  - Studio
  - TypeScript
  - URL
  - URLs
  - VS
  - Windows
  - JSON
  - Claude Code
  - GitHub Actions
  - Google Fonts
  - Google Workspace
  - SAML
  - Route 53
  - GA4
  - Mintlify
  - Launch URL
  - Enterprise Helm
  - Content-Signal
  - Color.Row
  - Tree.Folder
  - Tree.File
  - llms.txt
  - skill.md
  - vercel.json
  - CLAUDE.md
  - invalid_client
