asyncapi: 3.0.0
info:
  title: Schéma de test websocket
  version: 1.0.0
  description: Ceci est une API websocket de test.
channels:
  channelOne:
    title: Canal de test
    description: >-
      Ceci est un canal websocket.

      Il peut contenir du _markdown_ dans la description.

      * Utilisez le serveur "echo-websocket.hoppscotch.io" pour recevoir des messages horodatés chaque seconde.
      
      * Utilisez le serveur "echo.websocket.org" pour envoyer des messages de test au websocket. Ce serveur renverra en écho tous les messages que vous lui envoyez.

    address: /
    messages:
      TestMessage:
        $ref: '#/components/messages/TestMessage'
      Timestamp:
        $ref: '#/components/messages/Timestamp'
servers:
  echo-websocket:
    host: echo-websocket.hoppscotch.io
    protocol: wss
  echo:
    host: echo.websocket.org
    protocol: wss
operations:
  sendTestMessage:
    action: receive
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/TestMessage'
  receiveTestMessage:
    action: send
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/TestMessage'
  receiveTimestamp:
    action: send
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/Timestamp'
components:
  messages:
    TestMessage:
      title: Message de test
      description: Message de test envoyé au serveur d'écho
      payload:
        type: object
        properties:
          text:
            type: string
            description: Le texte de votre message
          subtext:
            type: string
            description: Deuxième champ de message optionnel
          from:
            type: string
            description: Le nom de l'expéditeur
        required:
          - text
    Timestamp:
      title: Horodatage
      description: Message d'horodatage envoyé depuis le serveur d'écho hoppscotch
      payload:
        schema:
          $ref: '#/components/schemas/Timestamp'
  schemas:
    Timestamp:
      type: string
      description: Message d'horodatage envoyé depuis le serveur d'écho hoppscotch
      examples:
        - '22:02:27 GMT+0000 (Coordinated Universal Time)'
