asyncapi: 3.0.0
info:
  title: Esquema de prueba de websocket
  version: 1.0.0
  description: Esta es una API de websocket de prueba.
channels:
  channelOne:
    title: Canal de prueba
    description: >-
      Este es un canal de websocket.

      Puede contener _markdown_ en la descripción.

      * Utiliza el servidor "echo-websocket.hoppscotch.io" para recibir mensajes con marca de tiempo cada segundo.
      
      * Utiliza el servidor "echo.websocket.org" para enviar mensajes de prueba al websocket. Este servidor devolverá como eco cualquier mensaje que le envíes.

    address: /
    messages:
      TestMessage:
        $ref: '#/components/messages/TestMessage'
      Timestamp:
        $ref: '#/components/messages/Timestamp'
servers:
  echo-websocket:
    host: echo-websocket.hoppscotch.io
    protocol: wss
  echo:
    host: echo.websocket.org
    protocol: wss
operations:
  sendTestMessage:
    action: receive
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/TestMessage'
  receiveTestMessage:
    action: send
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/TestMessage'
  receiveTimestamp:
    action: send
    channel:
      $ref: '#/channels/channelOne'
    messages:
      - $ref: '#/channels/channelOne/messages/Timestamp'
components:
  messages:
    TestMessage:
      title: Mensaje de prueba
      description: Mensaje de prueba enviado al servidor de eco
      payload:
        type: object
        properties:
          text:
            type: string
            description: El texto de tu mensaje
          subtext:
            type: string
            description: Segundo campo de mensaje opcional
          from:
            type: string
            description: El nombre del remitente
        required:
          - text
    Timestamp:
      title: Marca de tiempo
      description: Mensaje de marca de tiempo enviado desde el servidor de eco de hoppscotch
      payload:
        schema:
          $ref: '#/components/schemas/Timestamp'
  schemas:
    Timestamp:
      type: string
      description: Mensaje de marca de tiempo enviado desde el servidor de eco de hoppscotch
      examples:
        - '22:02:27 GMT+0000 (Coordinated Universal Time)'
